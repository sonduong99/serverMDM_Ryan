<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body { background: url("./IMG_8622.jpeg") no-repeat center/cover fixed; }
        
        .saomatishi { 
            background: #ffc526 !important; 
            color: #ffffff !important; 
            font-weight: 400 !important; 
            letter-spacing: normal; 
        }

        #dateTime00 { 
            padding-top: 4rem; 
            margin-bottom: 1rem; 
            color: #000000;
            font-weight: 500; 
        }
        
        #neirong1 { padding: 0.5rem 0 4rem; }

        .shuaxinerweima { 
            text-decoration: none; 
            display: block; 
            color: #000000 !important; 
            margin: 0; 
            font-weight: normal; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* KHUNG CHỨA ẢNH: Giữ nguyên diện tích để không nhảy chữ */
        #neirong {
            display: flex;
            align-items: center;
            justify-content: center;
            /* Bạn có thể thêm height cố định ở đây nếu muốn an toàn tuyệt đối, 
               nhưng bản script dưới đây đã xử lý việc giữ khung rồi */
        }

        .ewm {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <p><br><br></p>    
    <div class="zhengti">
        <div class="juzuo1">V25051817 (Pham Son Duong)</div>
        
        <div class="saomatishi juzhong">将二维码对准扫描器扫码进出场</div>
        
        <div class="yuan1 yuant"></div><div class="yuan2 yuant"></div>
        
        <div class="juzhong erweima zise">
            <div id="dateTime00" class="juzuo2"></div>
            
            <div id="neirong">
                <img class="ewm" id="displayImage" src="./ewm.gif">
            </div>

            <div id="neirong1">
                <a class="shuaxinerweima juzhong footsty" style="font-size: 3.3rem;" href="#">刷新二维码</a>
            </div>
        </div>
        
        <div class="dierhang">尊敬的员工您好，您已进入企业涉密区域，出于企业安全考慮，您的手机摄像头将被禁止拍摄，感谢您的配合。</div>
    </div>

<script>
    function update() {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const timePart = d.toTimeString().split(' ')[0]; 
        document.getElementById('dateTime00').innerText = `${year}-${month}-${day} ${timePart}`;
    }
    setInterval(update, 1000); 
    update();

    let count = 0;
    let timer;
    const btn = document.querySelector('.shuaxinerweima');
    const imgElement = document.getElementById('displayImage');

    function renderStatus() {
        const mode = localStorage.getItem('appMode');
        if (mode === 'tick') {
            imgElement.src = "./true.png";
            // CHỈ SỬA KÍCH THƯỚC DẤU TÍCH
            imgElement.style.width = "200px"; 
            // Giữ cho khung hình không bị hẫng bằng cách bù margin nếu cần, 
            // nhưng style.width là đủ để thu nhỏ ảnh mà không đổi font chữ.
        } else {
            imgElement.src = "./ewm.gif";
            // QUAY VỀ KÍCH THƯỚC GỐC CỦA MÃ QR (Xóa bỏ ép kích thước)
            imgElement.style.width = ""; 
        }
    }

    btn.onclick = function(e) {
        e.preventDefault();
        count++;
        clearTimeout(timer);
        timer = setTimeout(() => { count = 0; }, 3000);

        const currentMode = localStorage.getItem('appMode') || 'qr';
        if (currentMode === 'qr' && count === 5) {
            localStorage.setItem('appMode', 'tick');
            renderStatus();
            count = 0;
        } 
        else if (currentMode === 'tick' && count === 3) {
            localStorage.setItem('appMode', 'qr');
            renderStatus();
            count = 0;
        }
    };

    renderStatus();
</script>
</body>
</html>
