<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>&#8206;</title>
    <link rel="stylesheet" href="./style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            margin: 0;
        }

        .zhengti {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        .juzuo1 {
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.1rem;
        }

        /* 1. THANH VÀNG (Tiêu đề) - CHỈ BO GÓC TRÊN */
        .saomatishi {
            /* Màu vàng bạn có thể chỉnh lại cho đúng theo style.css của bạn, đây là màu minh họa */
            background: #f1c40f; 
            width: 90%;
            max-width: 380px;
            padding: 15px 0;
            text-align: center;
            /* ĐÂY LÀ CHỖ SỬA: Chỉ bo 2 góc TRÊN, 2 góc dưới để phẳng */
            border-radius: 12px 12px 0 0; 
            margin-bottom: 0 !important; /* QUAN TRỌNG: Triệt tiêu khoảng cách dưới */
        }

        /* 2. KHUNG TRẮNG (Chứa QR) - CHỈ BO GÓC DƯỚI */
        .erweima {
            /* QUAN TRỌNG: Nối khít với thanh vàng phía trên */
            margin-top: 0 !important; 
            margin-bottom: 40px !important; 
            padding-bottom: 30px !important; 
            background: #fff;
            /* ĐÂY LÀ CHỖ SỬA: Chỉ bo 2 góc DƯỚI, 2 góc trên để phẳng */
            border-radius: 0 0 12px 12px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 380px;
            /* Thêm đường kẻ mờ ngăn cách nhẹ nếu muốn, hoặc xóa dòng này đi */
            border-top: 1px solid #eee; 
        }

        .shuaxinerweima {
            margin-top: 1.8rem !important; 
            font-size: 3.3rem;
            text-decoration: none; 
            display: block;
            color: #666;
        }

        .dierhang {
            line-height: 1.8;
            padding: 0 30px;
            color: #ffffff;
            text-align: center;
        }

        #dateTime00 {
            font-weight: 500;
            padding-top: 20px;
            margin-bottom: 10px;
            color: #333;
        }
    </style>
</head>

<body>
<div class="zhengti">
    <div class="juzuo1">V25051817 (Phạm Sơn Dương)</div>
    
    <div class="saomatishi juzhong" id="biaoti">将二维码对准扫描器扫码进出场</div>
    
    <div class="juzhong erweima zise">
        <div id="dateTime00"></div>
        
        <div id="neirong">
            <img class="ewm" src="./ewm.gif">         
        </div>
        
        <div id="neirong1">    
            <a class="juzhong footsty shuaxinerweima" href="#">刷新二维码</a>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考慮，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm:ss');
    }, 1000);
</script>
</body>
</html>
