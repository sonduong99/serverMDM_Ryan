<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>Mã QR Ra Vào</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        /* Thiết lập nền cho toàn bộ trang */
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
        }

        .zhengti {
            padding: 40px 20px;
        }

        /* 1. Tên nhân viên phía trên cùng */
        .juzuo1 {
            color: #ffffff;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* 2. Phần Tiêu đề màu Vàng - Bo góc phía trên */
        .saomatishi {
            background-color: #ffbe00; /* Màu vàng chuẩn */
            color: #000;
            padding: 18px 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            margin: 0 15px; /* Căn lề hai bên */
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            display: block;
        }

        /* 3. Phần Khung màu Trắng - Bo góc phía dưới và sát mép vàng */
        .erweima {
            background-color: #ffffff;
            margin: 0 15px !important; /* Phải trùng với margin của phần vàng để khít lề */
            margin-top: 0 !important;   /* Quan trọng: Xóa bỏ khoảng cách với nền vàng */
            padding: 15px 0 35px 0 !important;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Chữ đồng hồ - Giữ nguyên font-weight 500 */
        #dateTime00 {
            font-weight: 500;
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
            padding-top: 5px;
        }

        /* Kích thước mã QR */
        .ewm {
            width: 220px; 
            height: auto;
            display: block;
        }

        /* Dòng chữ 'Làm mới mã QR' */
        .shuaxinerweima {
            margin-top: 1.8rem !important; 
            font-size: 3.3rem; /* Giữ nguyên kích thước bạn yêu cầu */
            text-decoration: none; 
            display: block;
            color: #555;
            font-weight: normal;
        }

        /* 4. Đoạn văn bản涉密 dưới cùng */
        .dierhang {
            margin-top: 25px;
            line-height: 1.7;
            padding: 0 25px;
            color: #ffffff;
            text-align: center;
            font-size: 0.95rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Các class hỗ trợ nếu có trong style.css cũ */
        .juzhong { text-align: center; }
        
        /* Ẩn các khối thừa để đảm bảo sát nhau */
        .yuant { display: none; } 
    </style>
</head>

<body>
<div class="zhengti">
    <div class="juzuo1">V25051817 (Phạm Sơn Dương)</div>
    
    <div class="saomatishi juzhong" id="biaoti">
        将二维码对准扫描器扫码进出场
    </div>
    
    <div class="erweima">
        <div id="dateTime00"></div>
        
        <div id="neirong">
            <img class="ewm" src="./ewm.gif" alt="QR Code">         
        </div>
        
        <div id="neirong1">    
            <a class="juzhong shuaxinerweima" href="#">刷新二维码</a>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // Định dạng ngày giờ
    Date.prototype.format = function (fmt) {
        var o = {
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    // Cập nhật giờ hệ thống mỗi giây
    function updateTime() {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm:ss');
    }

    setInterval(updateTime, 1000);
    updateTime(); // Chạy ngay lập tức khi load trang
</script>
</body>
</html>
