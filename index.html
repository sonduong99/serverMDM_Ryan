<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>&#8206;</title>
    <link rel="stylesheet" href="./style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
        }

        /* Tên nhân viên phía trên cùng */
        .juzuo1 {
            margin-bottom: 20px;
        }

        /* Khung màu trắng chứa QR (Lớp 'erweima') */
        .erweima {
            margin-top: 25px !important; /* Đẩy khung trắng xuống dưới dòng tiêu đề vàng */
            margin-bottom: 40px !important; /* Đẩy đoạn văn bản dưới cùng ra xa */
            padding-bottom: 20px !important; /* Tạo thêm khoảng trống bên dưới chữ 'Làm mới' */
        }

        /* Chỉnh dòng chữ 'Làm mới mã QR' */
        .shuaxinerweima {
            margin-top: 1.5rem !important; /* Khoảng cách vừa phải với mã QR */
            font-size: 3.3rem;
            text-decoration: none; /* Bỏ gạch chân cho giống mẫu */
            display: block;
        }

        /* Đoạn văn bản bảo mật dưới cùng */
        .dierhang {
            line-height: 1.6;
            padding: 0 25px;
        }
    </style>
</head>

<body>
<p><br><br></p>    
<div class="zhengti">
    <div class="juzuo1">V25051817 (Phạm Sơn Dương)</div>
    <div class="saomatishi juzhong" id="biaoti">将二维码对准扫描器扫码进出场</div>
    
    <div class="yuan1 yuant"></div>
    <div class="yuan2 yuant"></div>
    
    <div class="juzhong erweima zise">
        <div class="juzuo2" id="dateTime00" style="font-weight: 500; padding-top: 15px;"></div>
        <div id="neirong">
            <img class="ewm" src="./ewm.gif" style="width: 250px; height: 250px;">         
        </div>
        
        <div id="neirong1">    
            <div>
                <a class="juzhong footsty shuaxinerweima" href="#">刷新二维码</a>
            </div>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // 1. Định dạng ngày giờ
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    // 2. Cập nhật ngày giờ hệ thống (Dạng YYYY-MM-DD để giống ảnh mẫu)
    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm:ss');
    }, 1000);
</script>
</body>
</html>
