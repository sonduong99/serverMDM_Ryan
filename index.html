<style>
    /* 1. GIỮ NGUYÊN FONT CHỮ TOÀN TRANG */
    * {
        font-family: 'Noto Sans', sans-serif !important;
    }

    /* 2. CỐ ĐỊNH KÍCH THƯỚC KHUNG CHỨA QR */
    #neirong {
        width: 210px;  /* Chiều rộng cố định giống mã QR mẫu */
        height: 210px; /* Chiều cao cố định */
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    /* 3. ĐẢM BẢO ẢNH (DÙ LÀ QR HAY DẤU TÍCH) ĐỀU FILL ĐẦY KHUNG */
    .ewm {
        width: 100% !important;
        height: 100% !important;
        object-fit: contain; /* Giữ nguyên tỉ lệ ảnh, không bị méo */
        display: block;
    }
</style>

<script>
    // 1. CẬP NHẬT THỜI GIAN (Giữ nguyên font và định dạng)
    function update() {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const timePart = d.toTimeString().split(' ')[0]; 
        document.getElementById('dateTime00').innerText = `${year}-${month}-${day} ${timePart}`;
    }
    setInterval(update, 1000); 
    update();

    // 2. LOGIC NHẤN 5 LẦN & GIỮ KÍCH THƯỚC
    let count = 0;
    const btn = document.querySelector('.shuaxinerweima');
    const imgElement = document.getElementById('displayImage');
    const fileTich = "./true.png"; // Đã sửa tên file thành true.png

    // Hàm thực thi đổi ảnh
    function applyVerified() {
        imgElement.src = fileTich;
        // Đảm bảo khi đổi ảnh không bị nhảy font hay size
        imgElement.style.width = "100%";
        imgElement.style.height = "100%";
    }

    btn.addEventListener('click', function(e) {
        e.preventDefault(); 
        count++;

        if (count === 5) {
            applyVerified();
            localStorage.setItem('status', 'verified');
        }
    });

    // 3. DUY TRÌ TRẠNG THÁI KHI LOAD TRANG
    window.addEventListener('load', function() {
        if (localStorage.getItem('status') === 'verified') {
            applyVerified();
        }
    });
</script>
