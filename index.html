<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body { 
            background: url("./IMG_8622.jpeg") no-repeat center/cover fixed; 
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .zhengti { width: 100%; max-width: 500px; }

        .juzuo1 {
            color: white;
            padding: 20px 0 10px 20px;
            font-size: 1.1rem;
        }
        
        /* THANH TIÊU ĐỀ VÀNG */
        .saomatishi { 
            background: #ffc526; 
            color: #ffffff; 
            font-weight: bold;
            text-align: center;
            padding: 25px 15px;
            margin: 0 15px;
            border-radius: 15px;
            font-size: 1.8rem;
            line-height: 1.3;
        }

        /* KHUNG TRẮNG CHÍNH */
        .erweima-container {
            background: #ffffff;
            margin: 15px;
            border-radius: 15px;
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #dateTime00 { 
            color: #333;
            font-weight: 500; 
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        
        /* VÙNG CHỨA QR / DẤU TÍCH */
        #neirong {
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ewm {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* NÚT BẤM */
        .shuaxinerweima { 
            text-decoration: none; 
            color: #000000; 
            font-size: 2.8rem; /* Chỉnh kích thước chữ nút bấm */
            margin-top: 30px;
            display: block;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* DÒNG CHỮ CẢNH BÁO PHÍA DƯỚI */
        .dierhang {
            padding: 0 25px;
            color: #dddddd;
            font-size: 0.85rem;
            text-align: center;
            line-height: 1.5;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="zhengti">
        <div class="juzuo1">V25051817 (Pham Son Duong)</div>
        
        <div class="saomatishi">将二维码对准扫描器<br>扫码进出场</div>
        
        <div class="erweima-container">
            <div id="dateTime00"></div>
            
            <div id="neirong">
                <img class="ewm" id="qrImage" src="./ewm.gif">
                <img class="ewm" id="tickImage" src="./true.png" style="display: none;">
            </div>

            <a class="shuaxinerweima" href="#">刷新二维码</a>
        </div>
        
        <div class="dierhang">
            尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
        </div>
    </div>

<script>
    // 1. Cập nhật thời gian thực
    function updateClock() {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const timePart = d.toTimeString().split(' ')[0]; 
        document.getElementById('dateTime00').innerText = `${year}-${month}-${day} ${timePart}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. Logic nhấn và lưu trạng thái
    let clickCount = 0;
    let resetTimer;
    const TIME_LIMIT = 3000;

    const qrImg = document.getElementById('qrImage');
    const tickImg = document.getElementById('tickImage');

    function applyStatus() {
        const mode = localStorage.getItem('appMode');
        if (mode === 'tick') {
            qrImg.style.display = 'none';
            tickImg.style.display = 'block';
        } else {
            qrImg.style.display = 'block';
            tickImg.style.display = 'none';
        }
    }

    document.querySelector('.shuaxinerweima').addEventListener('click', function(e) {
        e.preventDefault();
        clickCount++;

        clearTimeout(resetTimer);
        resetTimer = setTimeout(() => { clickCount = 0; }, TIME_LIMIT);

        const currentMode = localStorage.getItem('appMode') || 'qr';

        if (currentMode === 'qr' && clickCount === 5) {
            localStorage.setItem('appMode', 'tick');
            applyStatus();
            clickCount = 0;
        } 
        else if (currentMode === 'tick' && clickCount === 3) {
            localStorage.setItem('appMode', 'qr');
            applyStatus();
            clickCount = 0;
        }
    });

    applyStatus();
</script>
</body>
</html>
