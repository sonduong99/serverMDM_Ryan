<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body { background: url("./IMG_8622.jpeg") no-repeat center/cover fixed; }
        
        .saomatishi { 
            background: #ffc526 !important; 
            color: #ffffff !important; 
            font-weight: 400 !important; 
            letter-spacing: normal; 
        }

        #dateTime00 { 
            padding-top: 4rem; 
            margin-bottom: 1rem; 
            color: #000000;
            font-weight: 500; 
        }
        
        /* ĐÂY LÀ PHẦN QUAN TRỌNG: Giữ vùng chứa ảnh cố định */
        #neirong {
            display: flex;
            align-items: center;
            justify-content: center;
            /* Giữ chiều cao tối thiểu bằng với mã QR gốc của bạn */
            min-height: 250px; 
        }

        #neirong1 { padding: 0.5rem 0 4rem; }

        .shuaxinerweima { 
            text-decoration: none; 
            display: block; 
            color: #000000 !important; 
            margin: 0; 
            font-weight: normal; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .ewm {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <p><br><br></p>    
    <div class="zhengti">
        <div class="juzuo1">V25051817 (Pham Son Duong)</div>
        <div class="saomatishi juzhong">将二维码对准扫描器扫码进出场</div>
        <div class="yuan1 yuant"></div><div class="yuan2 yuant"></div>
        
        <div class="juzhong erweima zise">
            <div id="dateTime00" class="juzuo2"></div>
            
            <div id="neirong">
                <img class="ewm" id="displayImage" src="./ewm.gif">
            </div>

            <div id="neirong1">
                <a class="shuaxinerweima juzhong footsty" style="font-size: 3.3rem;" href="#">刷新二维码</a>
            </div>
        </div>
        
        <div class="dierhang">尊敬的员工您好，您 đã vào khu vực mật của doanh nghiệp, vì lý do an ninh, camera điện thoại sẽ bị cấm, cảm ơn sự hợp tác.</div>
    </div>

<script>
    function update() {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const timePart = d.toTimeString().split(' ')[0]; 
        document.getElementById('dateTime00').innerText = `${year}-${month}-${day} ${timePart}`;
    }
    setInterval(update, 1000); 
    update();

    let count = 0;
    let timer;
    const btn = document.querySelector('.shuaxinerweima');
    const imgElement = document.getElementById('displayImage');

    function renderStatus() {
        const mode = localStorage.getItem('appMode');
        if (mode === 'tick') {
            imgElement.src = "./true.png";
            // Chỉ thu nhỏ kích thước ảnh dấu tích xuống 160px
            imgElement.style.width = "160px";
            imgElement.style.height = "auto";
        } else {
            imgElement.src = "./ewm.gif";
            // QR quay lại kích thước mặc định (xóa style đè lên)
            imgElement.style.width = "";
            imgElement.style.height = "";
        }
    }

    btn.onclick = function(e) {
        e.preventDefault();
        count++;
        clearTimeout(timer);
        timer = setTimeout(() => { count = 0; }, 3000);

        const currentMode = localStorage.getItem('appMode') || 'qr';
        if (currentMode === 'qr' && count === 5) {
            localStorage.setItem('appMode', 'tick');
            renderStatus();
            count = 0;
        } else if (currentMode === 'tick' && count === 3) {
            localStorage.setItem('appMode', 'qr');
            renderStatus();
            count = 0;
        }
    };

    renderStatus();
</script>
</body>
</html>
