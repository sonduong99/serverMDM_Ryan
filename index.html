<script>
    // 1. Cập nhật thời gian (Giữ nguyên logic của bạn)
    function update() {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const timePart = d.toTimeString().split(' ')[0]; 
        document.getElementById('dateTime00').innerText = `${year}-${month}-${day} ${timePart}`;
    }
    setInterval(update, 1000); 
    update();

    // 2. Logic xử lý dấu tích true.png
    let count = 0;
    let timer;
    const btn = document.querySelector('.shuaxinerweima');
    const neirong = document.getElementById('neirong');
    
    // Hàm hiển thị dựa trên trạng thái đã lưu
    function render() {
        const mode = localStorage.getItem('status');
        if (mode === 'checked') {
            neirong.innerHTML = '<img class="ewm" src="./true.png">';
        } else {
            neirong.innerHTML = '<img class="ewm" src="./ewm.gif">';
        }
    }

    btn.onclick = function(e) {
        e.preventDefault();
        count++;
        
        // Reset đếm nếu quá 3 giây không nhấn
        clearTimeout(timer);
        timer = setTimeout(() => { count = 0; }, 3000);

        const currentStatus = localStorage.getItem('status');

        // Nếu đang bình thường -> Nhấn 5 lần hiện tích
        if (currentStatus !== 'checked' && count === 5) {
            localStorage.setItem('status', 'checked');
            render();
            count = 0;
        } 
        // Nếu đang hiện tích -> Nhấn 3 lần quay lại QR
        else if (currentStatus === 'checked' && count === 3) {
            localStorage.setItem('status', 'qr');
            render();
            count = 0;
        }
    };

    // Chạy khi vừa load trang
    render();
</script>
</body>
</html>
