<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>&#8206;</title>
    <link rel="stylesheet" href="./style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
        }

        /* Tinh chỉnh khung trắng cân đối tuyệt đối */
        .erweima {
            height: auto !important; 
            padding-top: 2rem !important; 
            /* Khoảng cách từ Chữ xuống Đáy khung (D) */
            padding-bottom: 3.5rem !important; 
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 8px;
        }

        #neirong {
            margin-top: 1rem;
            line-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #neirong img.ewm {
            width: 23rem;
            height: 23rem;
            display: block;
        }

        #neirong1 {
            /* Khoảng cách từ QR xuống Chữ (K) - Đặt bằng với padding-bottom ở trên */
            margin-top: 3.5rem !important; 
        }

        .shuaxinerweima {
            font-size: 1.8rem !important; 
            color: #888 !important;       
            text-decoration: none;
            display: block;
            line-height: 1;
        }

        /* Style cho trạng thái thành công (Dấu tích xanh) */
        .true {
            width: 12rem;
            height: 12rem;
            margin-top: 2rem;
        }
        .truetxt {
            text-align: center;
            margin-top: 1rem;
        }
        .jinchang {
            font-size: 2.2rem;
            color: #2ba667;
            font-weight: bold;
            margin: 0.5rem 0;
        }
        .riqi {
            font-size: 1.6rem;
            color: #666;
        }
    </style>
</head>

<body>
<p><br><br></p>    
<div class="zhengti">
    <div class="juzuo1">V25051817 (Phạm Sơn Dương)</div>
    <div class="saomatishi juzhong" id="biaoti">将二维码对准扫描器扫码进出场</div>
    
    <div class="yuan1 yuant"></div>
    <div class="yuan2 yuant"></div>
    
    <div class="juzhong erweima zise">
        <div class="juzuo2" id="dateTime00" style="font-weight: 500; font-size: 1.8rem; color: #333;"></div>
        
        <div id="neirong">
            <img class="ewm" src="./ewm.gif">         
        </div>
        
        <div id="neirong1">    
            <a class="juzhong footsty shuaxinerweima" href="#">刷新二维码</a>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    // 1. Định dạng ngày giờ
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    // 2. Cập nhật ngày giờ phía trên QR liên tục
    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-M-d hh:mm:ss');
    }, 1000);

    // 3. Hàm chuyển sang giao diện Thành công (Dấu tích xanh)
    function showSuccess() {
        document.getElementById('biaoti').innerText = "您的设备已符合安全规范";
        document.getElementById('neirong1').style.display = "none"; // Ẩn chữ làm mới
        
        const container = document.getElementById('neirong');
        container.innerHTML = `
            <img class="true" src="./true.png">
            <div class="truetxt">
                <p class="jinchang">进场成功</p>
                <p class="riqi" id="dateTime01"></p>
            </div>
        `;

        // Cập nhật ngày giờ lúc thành công
        setInterval(function () {
            const dt = document.getElementById('dateTime01');
            if (dt) dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm');
        }, 1000);
    }

    // 4. Logic nhấn 5 lần vào chữ "刷新二维码" để hiện tích xanh
    let clickCount = [];
    const btnAction = document.querySelector('.shuaxinerweima');
    
    if (btnAction) {
        btnAction.addEventListener('click', function (e) {
            e.preventDefault();
            const now = Date.now();
            // Chỉ tính các lần nhấn trong vòng 3 giây
            clickCount = clickCount.filter(ts => now - ts < 3000);
            clickCount.push(now);

            if (clickCount.length >= 5) {
                showSuccess(); // Kích hoạt dấu tích xanh
                clickCount = []; 
            }
        });
    }
</script>
</body>
</html>
