<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body { 
            background: url("./IMG_8622.jpeg") no-repeat center/cover fixed; 
            margin: 0;
            padding: 0;
        }
        
        /* THANH TIÊU ĐỀ: Chữ MÀU TRẮNG */
        .saomatishi { 
            background: #ffc526 !important; 
            color: #ffffff !important; 
            font-weight: 400 !important; 
            letter-spacing: normal; 
        }

        /* KHUNG TRẮNG: Ngày tháng màu ĐEN */
        #dateTime00 { 
            padding-top: 4rem; 
            margin-bottom: 1rem; 
            color: #000000;
            font-weight: 500; 
            text-align: center;
        }
        
        /* GIỮ TỈ LỆ KHUNG HÌNH: Giúp bố cục đứng im khi đổi ảnh */
        #neirong {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 250px; /* Chiều cao an toàn tránh nhảy chữ */
            margin: 0 auto;
        }

        #neirong1 { padding: 0.5rem 0 4rem; }

        /* NÚT BẤM: Chữ màu ĐEN, to 3.3rem */
        .shuaxinerweima { 
            text-decoration: none; 
            display: block; 
            color: #000000 !important; 
            margin: 0; 
            font-weight: normal; 
            text-align: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .ewm {
            display: block;
            margin: 0 auto;
            max-width: 80%; /* Chống tràn viền */
            height: auto;
            object-fit: contain;
        }

        .dierhang {
            padding: 20px;
            color: #ffffff;
            font-size: 0.9rem;
            text-align: justify;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <p><br><br></p>    
    <div class="zhengti">
        <div class="juzuo1">V25051817 (Pham Son Duong)</div>
        
        <div class="saomatishi juzhong">将二维码对准扫描器扫码进出场</div>
        
        <div class="yuan1 yuant"></div><div class="yuan2 yuant"></div>
        
        <div class="juzhong erweima zise">
            <div id="dateTime00" class="juzuo2"></div>
            
            <div id="neirong">
                <img class="ewm" id="displayImage" src="./ewm.gif">
            </div>

            <div id="neirong1">
                <a class="shuaxinerweima juzhong footsty" style="font-size: 3.3rem;" href="#">刷新二维码</a>
            </div>
        </div>
        
        <div class="dierhang" id="triggerBtn">尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。</div>
    </div>

<script>
    // 1. CẬP NHẬT THỜI GIAN
    function update() {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const timePart = d.toTimeString().split(' ')[0]; 
        document.getElementById('dateTime00').innerText = `${year}-${month}-${day} ${timePart}`;
    }
    setInterval(update, 1000); 
    update();

    // 2. LOGIC NHẤN 5 LẦN VÀO DÒNG CHỮ DƯỚI CÙNG
    let count = 0;
    let timer;
    const triggerBtn = document.getElementById('triggerBtn');
    const imgElement = document.getElementById('displayImage');

    function renderStatus() {
        const mode = localStorage.getItem('appMode');
        if (mode === 'tick') {
            imgElement.src = "./true.png";
            imgElement.style.width = "180px"; // Kích thước dấu tích 180px
        } else {
            imgElement.src = "./ewm.gif";
            imgElement.style.width = ""; // Về mặc định cho QR
        }
    }

    triggerBtn.onclick = function() {
        count++;
        clearTimeout(timer);
        timer = setTimeout(() => { count = 0; }, 3000); 

        const currentMode = localStorage.getItem('appMode') || 'qr';
        
        if (currentMode === 'qr' && count === 5) {
            localStorage.setItem('appMode', 'tick');
            renderStatus();
            count = 0;
        } 
        else if (currentMode === 'tick' && count === 3) {
            localStorage.setItem('appMode', 'qr');
            renderStatus();
            count = 0;
        }
    };

    // Chặn mặc định nút làm mới
    document.querySelector('.shuaxinerweima').onclick = e => e.preventDefault();

    renderStatus();
</script>
</body>
</html>
