<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body { background: url("./IMG_8622.jpeg") no-repeat center/cover fixed; }
        .saomatishi { background: #ffc526 !important; color: #fff !important; font-weight: 400 !important; }
        #dateTime00 { padding-top: 4rem; margin-bottom: 1rem; color: #000; font-weight: 500; }
        #neirong1 { padding: 0.5rem 0 4rem; }
        .shuaxinerweima { 
            text-decoration: none; display: block; color: #000 !important; 
            font-size: 3.3rem; user-select: none; -webkit-tap-highlight-color: transparent; 
        }
        .ewm { max-width: 100%; height: auto; display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="zhengti">
        <div class="juzuo1">V25051817 (Phạm Sơn Dương)</div>
        <div class="saomatishi juzhong">将二维码对准扫描器扫码进出场</div>
        <div class="yuan1 yuant"></div><div class="yuan2 yuant"></div>
        
        <div class="juzhong erweima zise">
            <div id="dateTime00" class="juzuo2"></div>
            <div id="neirong">
                <img class="ewm" id="displayImage" src="./ewm.gif">
            </div>
            <div id="neirong1">
                <a class="shuaxinerweima juzhong" href="javascript:void(0)">刷新二维码</a>
            </div>
        </div>
        
        <div class="dierhang">尊敬的员工您好，您已进入企业涉密区域...</div>
    </div>

<script>
    const imgElement = document.getElementById('displayImage');
    const btn = document.querySelector('.shuaxinerweima');
    const timeBox = document.getElementById('dateTime00');
    const FILE_TICH = "./true.png"; // Đã sửa thành chữ thường

    // 1. Cập nhật thời gian
    const updateTime = () => {
        const d = new Date();
        const date = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        const time = d.toTimeString().split(' ')[0];
        timeBox.textContent = `${date} ${time}`;
    };
    setInterval(updateTime, 1000);
    updateTime();

    // 2. Logic nhấn 5 lần
    let count = 0;

    const setVerified = () => {
        imgElement.src = FILE_TICH;
        // Tùy chỉnh kích thước nếu ảnh true.png quá to
        imgElement.style.width = "180px"; 
        localStorage.setItem('isVerified', 'true');
    };

    // Kiểm tra trạng thái khi tải trang
    if (localStorage.getItem('isVerified') === 'true') {
        setVerified();
    }

    btn.addEventListener('click', (e) => {
        count++;
        if (count === 5) {
            setVerified();
            count = 0; 
        }
    });

    // Mẹo: Nhấn giữ nút 3 giây để xóa dấu tích (về lại mã QR)
    let timer;
    btn.addEventListener('mousedown', () => {
        timer = setTimeout(() => {
            localStorage.removeItem('isVerified');
            location.reload();
        }, 3000);
    });
    btn.addEventListener('mouseup', () => clearTimeout(timer));
    btn.addEventListener('touchstart', () => { // Hỗ trợ trên điện thoại
        timer = setTimeout(() => {
            localStorage.removeItem('isVerified');
            location.reload();
        }, 3000);
    });
    btn.addEventListener('touchend', () => clearTimeout(timer));
</script>
</body>
</html>
