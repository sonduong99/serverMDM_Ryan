<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=GBK">
    <title>&#8206;</title>
    <link rel="stylesheet" href="./style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("./IMG_8622.jpeg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .zhengti {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            width: 100%;
        }

        .juzuo1 {
            margin-bottom: 20px;
            color: #ccc;
            font-size: 1rem;
        }

        /* KHỐI CHUNG ĐỂ CỐ ĐỊNH CHIỀU RỘNG */
        .container-qr {
            width: 85%; /* Bạn có thể chỉnh 320px nếu muốn cố định */
            max-width: 350px;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Cắt các phần thừa để bo góc chuẩn */
            border-radius: 15px; /* Bo cả khối lớn */
        }

        /* THANH VÀNG TRÊN */
        .saomatishi {
            background: #f1c40f !important; /* Màu vàng */
            margin: 0 !important;
            padding: 20px 10px !important;
            width: 100% !important;
            box-sizing: border-box;
            text-align: center;
            color: #fff;
            font-size: 1.1rem;
        }

        /* KHUNG TRẮNG DƯỚI */
        .erweima {
            background: #fff !important;
            margin: 0 !important;
            width: 100% !important;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 30px !important;
            border: none !important;
        }

        /* Ngày giờ trên QR */
        #dateTime00 {
            padding-top: 15px;
            margin-bottom: 5px;
            color: #333;
            font-size: 1.1rem;
        }

        /* Ảnh QR */
        .ewm {
            width: 80%; /* Để QR không bị chạm mép trắng */
            height: auto;
        }

        /* Chữ Làm mới mã QR */
        .shuaxinerweima {
            margin-top: 1.5rem !important;
            font-size: 1.2rem !important; /* Chỉnh lại font size vì 3.3rem có thể quá to gây tràn khung */
            text-decoration: none;
            color: #888;
            display: block;
        }

        /* Văn bản dưới cùng */
        .dierhang {
            margin-top: 30px;
            line-height: 1.6;
            padding: 0 40px;
            color: #ddd;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
<div class="zhengti">
    <div class="juzuo1">V25051817 (Phạm Sơn Dương)</div>
    
    <div class="container-qr">
        <div class="saomatishi" id="biaoti">
            将二维码对准扫描器扫码进出场
        </div>
        
        <div class="erweima">
            <div id="dateTime00"></div>
            <div id="neirong">
                <img class="ewm" src="./ewm.gif">         
            </div>
            <div id="neirong1">    
                <a class="shuaxinerweima" href="#">刷新二维码</a>
            </div>
        </div>
    </div>

    <div class="dierhang">
        尊敬的员工您好，您已进入企业涉密区域，出于企业安全考虑，您的手机摄像头将被禁止拍摄，感谢您的配合。
    </div>
</div>

<script>
    Date.prototype.format = function (fmt) {
        var o = {
            "y+": this.getFullYear(),
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
        };
        if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
        for (var k in o)
            if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
        return fmt;
    }

    setInterval(function () {
        const dt = document.getElementById('dateTime00');
        if (dt) dt.innerHTML = (new Date()).format('yyyy-MM-dd hh:mm:ss');
    }, 1000);
</script>
</body>
</html>
